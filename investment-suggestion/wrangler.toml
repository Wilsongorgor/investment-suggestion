name = "investment-suggestion"
compatibility_date = "2024-12-02"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "out"

[vars]
ENVIRONMENT = "production"

# ============================================
# 环境变量 - 需要在 Cloudflare Dashboard 中配置
# ============================================
# 请勿在此文件中填写敏感信息！
# 在 Cloudflare Dashboard -> Workers & Pages -> 你的项目 -> Settings -> Environment variables 中添加：
#
# - SILICONFLOW_API_KEY: 硅基流动 API 密钥
#   获取地址：https://cloud.siliconflow.cn
#
# - SILICONFLOW_MODEL: 模型名称（可选）
#   默认值：deepseek-ai/DeepSeek-V3.2
#   其他选项：deepseek-ai/DeepSeek-V3, Qwen/Qwen2.5-72B-Instruct
